<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Simulador</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e; 
            --info: #0ea5e9;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg-dark));
            color: var(--text-light);
            padding: 20px; margin: 0;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }

        .seccion { 
            background: var(--card-bg); padding: 20px; border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; 
            width: 95%; max-width: 1100px; border: 1px solid rgba(255,255,255,0.05);
        }

        .contenedor-estados { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; width: 95%; max-width: 1100px; }
        
        .caja-estado { 
            background: rgba(15, 23, 42, 0.5); border: 2px solid #334155; border-radius: 16px; 
            padding: 10px; min-height: 180px; text-align: center;
        }

        .proceso-ficha { 
            width: 65px; height: 65px; border-radius: 12px; margin: 10px auto; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; color: white; font-weight: bold; font-size: 11px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s;
        }

        /* Gráfica CSS */
        .bar-container { 
            display: flex; align-items: flex-end; height: 120px; gap: 12px; 
            margin-top: 10px; padding: 15px; background: #0f172a; 
            border-radius: 12px; border: 1px solid #334155; justify-content: center;
        }
        .bar { 
            width: 35px; background: var(--primary); transition: height 0.5s ease; 
            position: relative; border-radius: 4px 4px 0 0; 
        }
        .bar-label { position: absolute; bottom: -22px; width: 100%; text-align: center; font-size: 10px; color: #94a3b8; }
        .bar-value { position: absolute; top: -18px; width: 100%; text-align: center; font-size: 10px; color: var(--success); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #334155; padding: 8px; text-align: center; font-size: 13px; }
        th { background: var(--primary); color: white; }

        #log-container { 
            background: #000; color: #10b981; padding: 12px; border-radius: 12px; 
            height: 90px; overflow-y: auto; font-family: 'Courier New', monospace; 
            font-size: 12px; border: 1px solid #334155; text-align: left;
        }

        input, select { padding: 8px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin: 5px; }
        button { padding: 10px 18px; border-radius: 10px; cursor: pointer; border: none; color: white; font-weight: bold; transition: 0.3s; }
        .btn-play { background: var(--success); }
        .btn-add { background: var(--info); }
        .btn-reset { background: var(--danger); }
        button:hover { transform: scale(1.03); filter: brightness(1.1); }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px;">Simulador de Procesos</h2>
    
    <div class="seccion" style="text-align: center;">
        <label>Algoritmo:</label>
        <select id="selectorAlgoritmo">
            <option value="RR">ROUND ROBIN</option>
            <option value="FCFS">PRIMERO EN LLEGAR PRIMERO</option>
            <option value="SJF">MAS CORTO PRIMERO</option>
        </select>
        <button id="btnAuto" class="btn-play" onclick="toggleAuto()">▶ Iniciar</button>
        <button class="btn-reset" onclick="location.reload()">Reiniciar Sistema</button>
        <span style="margin-left:20px; font-size: 1.2rem;">⏱ <span id="tiempo" style="color:var(--info); font-weight:bold;">0</span>s</span>
    </div>

    <div class="contenedor-estados">
        <div id="espera" class="caja-estado"><h3>Llegada</h3></div>
        <div id="listos" class="caja-estado"><h3 style="color:var(--warning)">Listos</h3></div>
        <div id="ejecucion" class="caja-estado"><h3 style="color:var(--info)">CPU</h3></div>
        <div id="terminado" class="caja-estado"><h3 style="color:var(--success)">Terminados</h3></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 95%; max-width: 1100px;">
        <div>
            <div class="seccion">
                <h4 style="margin:0 0 15px 0; color:var(--primary)">Añadir Proceso</h4>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="nombreP" placeholder="Nombre" style="flex:1">
                    <input type="number" id="burstP" placeholder="Ráfaga" style="flex:1">
                    <input type="number" id="llegadaP" value="0" style="flex:1">
                    <button class="btn-add" onclick="agregarProceso()">+</button>
                </div>
            </div>
            <div id="log-container">
                <div id="log-texto">> Sistema Listo.</div>
            </div>
        </div>

        <div class="seccion">
            <h4 style="margin:0; color:var(--primary)">Grafica de Espera (W)</h4>
            <div id="grafica-espera" class="bar-container">
                <p style="color:#475569; font-size: 11px;">Sin datos aun...</p>
            </div>
        </div>
    </div>

    <div class="seccion">
        <h4 style="margin:0 0 10px 0; color:var(--primary)">Resultados del Sistema</h4>
        <table>
            <thead>
                <tr><th>Proceso</th><th>Llegada</th><th>Rafaga</th><th>Fin</th><th>Retorno</th><th>Espera</th></tr>
            </thead>
            <tbody id="tabla-cuerpo"></tbody>
        </table>
        <div style="margin-top:15px; display: flex; justify-content: center; gap: 40px; font-weight: bold; font-size: 0.9rem;">
            <span>E. Promedio: <span id="avg-wait" style="color:var(--success)">0.00</span>s</span>
            <span>R. Promedio: <span id="avg-turnaround" style="color:var(--info)">0.00</span>s</span>
        </div>
    </div>

    <script>
        let reloj = 0, quantum = 3, contadorQuantum = 0;
        let procesoEnCPU = null, colaListos = [], modoAuto = false, intervalo;
        let procesos = [
            { id: "P1", nombre: "P1", burst: 5, restante: 5, llegada: 0, estado: "espera", color: "#6366f1", fin: 0 },
            { id: "P2", nombre: "P2", burst: 3, restante: 3, llegada: 1, estado: "espera", color: "#f43f5e", fin: 0 },
            { id: "P3", nombre: "P3", burst: 4, restante: 4, llegada: 2, estado: "espera", color: "#10b981", fin: 0 }
        ];

        function toggleAuto() {
            const pendientes = procesos.filter(p => p.estado !== "terminado").length;
            if (!modoAuto && pendientes === 0) {
                escribirLog("No hay procesos pendientes.");
                return;
            }

            modoAuto = !modoAuto;
            const btn = document.getElementById("btnAuto");
            if (modoAuto) {
                btn.innerText = "⏸ Pausar";
                btn.style.background = "var(--warning)";
                intervalo = setInterval(iniciarSimulacion, 1000);
            } else {
                detenerSimulacion();
            }
        }

        function detenerSimulacion() {
            modoAuto = false;
            clearInterval(intervalo);
            const btn = document.getElementById("btnAuto");
            btn.innerText = "▶ Iniciar Automático";
            btn.style.background = "var(--success)";
        }

        function iniciarSimulacion() {
            const algoritmo = document.getElementById("selectorAlgoritmo").value;
            
            procesos.forEach(p => {
                if (p.llegada === reloj && p.estado === "espera") {
                    p.estado = "listo"; 
                    colaListos.push(p);
                    escribirLog(`Proceso ${p.nombre} llegó.`);
                }
            });

            if (procesoEnCPU) {
                procesoEnCPU.restante--;
                if (algoritmo === "RR") contadorQuantum++;

                if (procesoEnCPU.restante === 0) {
                    procesoEnCPU.estado = "terminado"; 
                    procesoEnCPU.fin = reloj + 1;
                    escribirLog(`${procesoEnCPU.nombre} terminado.`);
                    procesoEnCPU = null; 
                    contadorQuantum = 0;
                    actualizarResultados();
                } else if (algoritmo === "RR" && contadorQuantum === quantum) {
                    escribirLog(`Quantum fin: ${procesoEnCPU.nombre} a cola.`);
                    procesoEnCPU.estado = "listo"; 
                    colaListos.push(procesoEnCPU);
                    procesoEnCPU = null; 
                    contadorQuantum = 0;
                }
            }

            if (!procesoEnCPU && colaListos.length > 0) {
                if (algoritmo === "SJF") colaListos.sort((a, b) => a.restante - b.restante);
                procesoEnCPU = colaListos.shift();
                procesoEnCPU.estado = "ejecucion";
                escribirLog(`${procesoEnCPU.nombre} en CPU.`);
            }

            actualizarInterfaz();
            
            // VERIFICACIÓN DE AUTO-DETENCIÓN
            const pendientesFinales = procesos.filter(p => p.estado !== "terminado").length;
            if (pendientesFinales === 0 && !procesoEnCPU) {
                escribirLog("✔ Simulación completada.");
                detenerSimulacion();
            } else {
                reloj++;
                document.getElementById("tiempo").innerText = reloj;
            }
        }

        function actualizarInterfaz() {
            procesos.forEach(p => {
                let ficha = document.getElementById("proceso-" + p.id);
                if (!ficha) {
                    ficha = document.createElement("div");
                    ficha.id = "proceso-" + p.id;
                    ficha.className = "proceso-ficha";
                    ficha.style.backgroundColor = p.color;
                    document.getElementById("espera").appendChild(ficha);
                }
                ficha.innerHTML = `<span>${p.nombre}</span><small>R:${p.restante}s</small>`;
                document.getElementById(p.estado === "listo" ? "listos" : p.estado === "ejecucion" ? "ejecucion" : p.estado === "terminado" ? "terminado" : "espera").appendChild(ficha);
            });
        }

        function actualizarResultados() {
            const cuerpo = document.getElementById("tabla-cuerpo");
            const grafica = document.getElementById("grafica-espera");
            cuerpo.innerHTML = ""; grafica.innerHTML = "";
            let terminados = procesos.filter(p => p.estado === "terminado");
            let sumW = 0, sumT = 0;

            terminados.forEach(p => {
                let t = p.fin - p.llegada, w = t - p.burst;
                sumW += w; sumT += t;
                cuerpo.innerHTML += `<tr><td>${p.nombre}</td><td>${p.llegada}</td><td>${p.burst}</td><td>${p.fin}</td><td>${t}</td><td>${w}</td></tr>`;
                
                let bar = document.createElement("div");
                bar.className = "bar";
                bar.style.height = Math.max(w * 12, 5) + "px";
                bar.innerHTML = `<div class="bar-value">${w}s</div><div class="bar-label">${p.nombre}</div>`;
                bar.style.backgroundColor = p.color;
                grafica.appendChild(bar);
            });

            if (terminados.length > 0) {
                document.getElementById("avg-wait").innerText = (sumW / terminados.length).toFixed(2);
                document.getElementById("avg-turnaround").innerText = (sumT / terminados.length).toFixed(2);
            }
        }

        function escribirLog(m) {
            const log = document.getElementById("log-texto");
            log.innerHTML += `<br>> [${reloj}s] ${m}`;
            log.parentElement.scrollTop = log.parentElement.scrollHeight;
        }

        function agregarProceso() {
            const n = document.getElementById("nombreP").value || "PX";
            const b = parseInt(document.getElementById("burstP").value);
            const l = parseInt(document.getElementById("llegadaP").value) || 0;
            if (b > 0) {
                procesos.push({ 
                    id: "p"+Date.now(), nombre: n, burst: b, restante: b, 
                    llegada: l, estado: "espera", color: "hsl("+Math.random()*360+",70%,60%)", fin: 0 
                });
                actualizarInterfaz();
                escribirLog(`Añadido: ${n}`);
            }
        }

        actualizarInterfaz();
    </script>
</body>
</html>
